<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Space-Time Bezier - Interactive Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #eee; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
  #ui {
    position: fixed; top: 10px; left: 10px; z-index: 10;
    background: rgba(20,20,40,0.92); padding: 14px 18px; border-radius: 10px;
    border: 1px solid #333; min-width: 270px;
  }
  #ui h2 { font-size: 14px; margin-bottom: 8px; color: #8af; }
  #ui label { font-size: 12px; display: block; margin-top: 6px; color: #aaa; }
  #ui select, #ui input[type=range] { width: 100%; }
  select { background: #222; color: #eee; border: 1px solid #555; padding: 3px; font-size: 11px; margin: 3px 0; }
  .val { float: right; color: #ff0; font-size: 12px; }
  .toggle { margin-top: 5px; font-size: 12px; cursor: pointer; user-select: none; }
  .toggle input { margin-right: 5px; }
  #info {
    position: fixed; bottom: 10px; right: 10px; z-index: 10;
    background: rgba(20,20,40,0.92); padding: 10px 14px; border-radius: 8px;
    border: 1px solid #333; font-size: 11px; font-family: monospace; white-space: pre;
    max-width: 380px; max-height: 300px; overflow-y: auto;
  }
  #solverStatus {
    position: fixed; bottom: 320px; right: 10px; z-index: 10;
    background: rgba(20,20,40,0.92); padding: 8px 12px; border-radius: 8px;
    border: 1px solid #333; font-size: 11px; font-family: monospace;
    max-width: 520px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #solverStatus.solved { border-color: #2ecc71; color: #9af2b6; }
  #solverStatus.infeasible { border-color: #f39c12; color: #ffd37a; }
  #solverStatus.failed { border-color: #e74c3c; color: #ffb3ad; }
  #solverStatus.solving { border-color: #8af; color: #8af; }
  #solverStatus.offline { border-color: #555; color: #888; }
  #solverStatus .progress {
    display: block; margin-top: 4px; height: 4px; width: 100%;
    background: rgba(255,255,255,0.07); border-radius: 2px; overflow: hidden;
  }
  #solverStatus .progress > .bar {
    display: block; height: 100%; width: 0%;
    background: #8af; transition: width 100ms linear;
  }
  #solverStatus.solved .progress > .bar { background: #2ecc71; }
  #solverStatus.infeasible .progress > .bar { background: #f39c12; }
  #solverStatus.failed .progress > .bar { background: #e74c3c; }
  #solverStatus.offline .progress { visibility: hidden; }
  .sandbox-section { margin-top: 10px; padding-top: 8px; border-top: 1px solid #2a2a44; }
  .sandbox-section[data-disabled="true"] { opacity: 0.4; pointer-events: none; }
  .num-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-top: 6px; }
  .num-cell { display: flex; flex-direction: column; }
  .num-cell label { font-size: 11px; color: #aaa; margin: 0 0 2px 0; }
  .num-cell input[type=number] {
    background: #222; color: #eee; border: 1px solid #555; border-radius: 3px;
    padding: 3px 5px; font-size: 11px; font-family: monospace; width: 100%;
  }
  .num-cell input[type=number]:focus { border-color: #6a8fd9; outline: none; }
  .view-mode { display: flex; gap: 4px; margin: 3px 0 4px 0; }
  .view-mode .seg {
    flex: 1; padding: 5px 8px; font-size: 12px; cursor: pointer;
    background: #222; color: #ccc; border: 1px solid #444; border-radius: 4px;
  }
  .view-mode .seg:hover { background: #2c2c48; color: #fff; }
  .view-mode .seg.active { background: #3f5fa8; color: #fff; border-color: #6a8fd9; }
  body[data-view-mode="2d"] .view-3d-only { display: none; }
  body[data-server-mode="true"] .fallback-only { display: none; }
  body[data-server-mode="false"] .server-only { display: none; }
  .t-row { display: flex; gap: 4px; align-items: center; margin: 2px 0 4px 0; }
  .t-row input[type=range] { flex: 1; }
  .t-row button {
    width: 28px; height: 26px; padding: 0; font-size: 14px; line-height: 1;
  }
  #btnResetProblem { width: 100%; padding: 6px 10px; font-size: 12px; }
  #legend {
    position: fixed; top: 10px; right: 10px; z-index: 10;
    background: rgba(20,20,40,0.92); padding: 10px 14px; border-radius: 8px;
    border: 1px solid #333; font-size: 11px;
  }
  canvas { display: block; cursor: grab; }
  button { padding: 4px 14px; cursor: pointer; background: #333; color: #eee; border: 1px solid #555; border-radius: 4px; }
  button:hover { background: #444; }
</style>
</head>
<body>

<div id="ui">
  <h2>Space-Time Bezier Demo</h2>

  <label>Scenario</label>
  <select id="scenarioSelect"></select>

  <label class="fallback-only">Curve config <span class="val" id="curveInfo" style="color:#0f0"></span></label>
  <select id="curveSelect" class="fallback-only"></select>

  <label>View mode</label>
  <div class="view-mode" role="radiogroup" aria-label="View mode">
    <button type="button" class="seg active" id="btnView3D" data-mode="3d">3D</button>
    <button type="button" class="seg" id="btnView2D" data-mode="2d">2D (x, y)</button>
  </div>

  <label>Time t <span class="val" id="tVal">0.0</span></label>
  <div class="t-row">
    <input type="range" id="tSlider" min="0" max="1" step="0.002" value="0">
    <button id="btnPlay" title="Play / pause the time sweep">&#9654;</button>
    <button id="btnReset" title="Reset t to 0">&#11118;</button>
  </div>

  <label class="view-3d-only">View rotation <span class="val" id="rotVal">-55</span></label>
  <input type="range" class="view-3d-only" id="rotSlider" min="-180" max="180" step="1" value="-55">

  <label class="view-3d-only">View elevation <span class="val" id="elevVal">22</span></label>
  <input type="range" class="view-3d-only" id="elevSlider" min="5" max="85" step="1" value="22">

  <div class="toggle view-3d-only"><input type="checkbox" id="chkTubes" checked>Obstacle tubes</div>
  <div class="toggle"><input type="checkbox" id="chkHull">Convex hull</div>
  <div class="toggle"><input type="checkbox" id="chkSegments" checked>De Casteljau segments</div>
  <div class="toggle view-3d-only"><input type="checkbox" id="chkHalfspace">Supporting half-spaces</div>
  <div class="toggle"><input type="checkbox" id="chkDistLines">Distance lines</div>
  <div class="toggle view-3d-only"><input type="checkbox" id="chkTimePlane" checked>Time-sweep plane</div>
  <div class="toggle"><input type="checkbox" id="chkInitCurve">Initial guess curve</div>

  <div class="sandbox-section" id="sandboxSection" data-disabled="true">
    <h2 style="font-size:13px;margin-bottom:4px;color:#8af">Optimizer parameters</h2>
    <label>Curve order N <span class="val" id="nVal">8</span></label>
    <input type="range" id="nSlider" min="4" max="14" step="1" value="8">

    <label>Segments n_seg <span class="val" id="nsegVal">8</span></label>
    <input type="range" id="nsegSlider" min="2" max="24" step="1" value="8">

    <label>Proximal weight <span class="val" id="proxVal">0.50</span></label>
    <input type="range" id="proxSlider" min="0.01" max="2" step="0.01" value="0.5">

    <label>Trust-region radius <span class="val" id="trustVal">0.00</span></label>
    <input type="range" id="trustSlider" min="0" max="2" step="0.01" value="0">

    <label>Time scale &alpha; <span class="val" id="alphaVal">1.50</span></label>
    <input type="range" id="alphaSlider" min="1" max="3" step="0.05" value="1.5">

    <label title="1 = isotropic spherical caps. >1 elongates caps in t, &lt;1 flattens them. Cylinder body is unaffected.">Cap roundness <span class="val" id="capRoundVal">2.00</span></label>
    <input type="range" id="capRoundSlider" min="0.2" max="5" step="0.05" value="2">

    <div class="num-grid">
      <div class="num-cell">
        <label for="maxIterInput">max_iter</label>
        <input type="number" id="maxIterInput" min="1" max="2000" step="1" value="30">
      </div>
      <div class="num-cell">
        <label for="tolInput">tol</label>
        <input type="number" id="tolInput" step="any" value="1e-6">
      </div>
      <div class="num-cell">
        <label for="minDtInput">min_dt</label>
        <input type="number" id="minDtInput" min="0" step="any" value="0.1">
      </div>
    </div>
  </div>

  <div class="server-only" style="margin-top:10px">
    <button id="btnResetProblem" title="Drop current solution, show initial guess only">Reset problem</button>
  </div>
</div>

<div id="solverStatus" class="offline">
  <span id="solverStatusText">solver: offline (no server)</span>
  <span class="progress"><span class="bar" id="solverProgressBar"></span></span>
</div>

<div id="info"></div>
<div id="legend"></div>

<canvas id="c"></canvas>

// ══════════════════════════════════════════════════════════════
// Math
// ══════════════════════════════════════════════════════════════
function comb(n, k) { if (k < 0 || k > n) return 0; let r = 1; for (let i = 0; i < k; i++) r = r * (n - i) / (i + 1); return r; }
function bernstein(n, i, t) { return comb(n, i) * Math.pow(t, i) * Math.pow(1 - t, n - i); }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function wrapAngle(deg) { return ((deg + 180) % 360 + 360) % 360 - 180; }

function evalBezier(cp, t) {
  const n = cp.length - 1; let pt = new Array(cp[0].length).fill(0);
  for (let i = 0; i <= n; i++) { const b = bernstein(n, i, t); for (let d = 0; d < pt.length; d++) pt[d] += b * cp[i][d]; }
  return pt;
}

function bezierCurve(cp, num = 400) {
  const pts = []; for (let i = 0; i <= num; i++) pts.push(evalBezier(cp, i / num)); return pts;
}

function deCasteljauSplit(cp, u) {
  const n = cp.length - 1, dim = cp[0].length;
  let left = [cp[0].slice()], right = [cp[n].slice()];
  let work = cp.map(p => p.slice());
  for (let r = 1; r <= n; r++) {
    let next = [];
    for (let i = 0; i < work.length - 1; i++) {
      let p = []; for (let d = 0; d < dim; d++) p.push((1 - u) * work[i][d] + u * work[i + 1][d]);
      next.push(p);
    }
    left.push(next[0].slice()); right.unshift(next[next.length - 1].slice()); work = next;
  }
  return { left, right };
}

function subdivide(cp, nSeg) {
  const segs = []; let rem = cp.map(p => p.slice());
  for (let i = 0; i < nSeg - 1; i++) { const { left, right } = deCasteljauSplit(rem, 1 / (nSeg - i)); segs.push(left); rem = right; }
  segs.push(rem); return segs;
}

function convexHull2D(points) {
  if (points.length < 3) return points.map((_, i) => i);
  const pts = points.map((p, i) => ({ x: p[0] || p.x, y: p[1] || p.y, i }));
  pts.sort((a, b) => a.x - b.x || a.y - b.y);
  const cross = (O, A, B) => (A.x - O.x) * (B.y - O.y) - (A.y - O.y) * (B.x - O.x);
  const lower = []; for (const p of pts) { while (lower.length >= 2 && cross(lower[lower.length-2], lower[lower.length-1], p) <= 0) lower.pop(); lower.push(p); }
  const upper = []; for (let i = pts.length - 1; i >= 0; i--) { const p = pts[i]; while (upper.length >= 2 && cross(upper[upper.length-2], upper[upper.length-1], p) <= 0) upper.pop(); upper.push(p); }
  upper.pop(); lower.pop(); return lower.concat(upper).map(p => p.i);
}

// ══════════════════════════════════════════════════════════════
// 3D Projection
// ══════════════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
function updateCanvasCursor() {
  if (viewMode === '2d') { canvas.style.cursor = 'default'; return; }
  canvas.style.cursor = dragMode ? 'grabbing' : 'grab';
}
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', () => { resize(); draw(); }); resize();
updateCanvasCursor();

function project(x, y, z) {
  const cx = x - SCENE_CENTER[0], cy = y - SCENE_CENTER[1], cz = z - SCENE_CENTER[2];
  const az = azimuth * Math.PI / 180, el = elevation * Math.PI / 180;
  const rx = cx * Math.cos(az) - cy * Math.sin(az);
  const ry = cx * Math.sin(az) + cy * Math.cos(az);
  const ry2 = ry * Math.cos(el) - cz * Math.sin(el);
  const rz2 = ry * Math.sin(el) + cz * Math.cos(el);
  return { x: rx * viewScale, y: -rz2 * viewScale, z: ry2 };
}
function toScreen(x, y, z) { const p = project(x, y, z); return { x: canvas.width * 0.55 + panX + p.x, y: canvas.height * 0.5 + panY + p.y, z: p.z }; }

// Inverse of toScreen constrained to a horizontal plane at fixed t. Used by
// L-click drag: the cursor slides the control point across the (x, y) plane
// at the CP's current time.
function screenToWorldAtFixedT(cx, cy, tFixed) {
  const az = azimuth * Math.PI / 180, el = elevation * Math.PI / 180;
  const rx = (cx - (canvas.width * 0.55 + panX)) / viewScale;
  const rz2 = -(cy - (canvas.height * 0.5 + panY)) / viewScale;
  const pz = tFixed - SCENE_CENTER[2];
  const sinEl = Math.sin(el);
  // elevation is clamped to [5, 85] degrees in camera controls, so sinEl is
  // never small enough to blow up; no guard needed.
  const ry = (rz2 - pz * Math.cos(el)) / sinEl;
  const px = rx * Math.cos(az) + ry * Math.sin(az);
  const py = -rx * Math.sin(az) + ry * Math.cos(az);
  return [px + SCENE_CENTER[0], py + SCENE_CENTER[1]];
}

// Inverse of toScreen constrained to a vertical line at fixed (x, y). Used by
// Shift+L-click drag: the cursor slides the control point along t. Only the
// cursor's screen Y matters; screen X is fixed (determined by (x, y)).
function screenYToTAtFixedXY(cy, xFixed, yFixed) {
  const az = azimuth * Math.PI / 180, el = elevation * Math.PI / 180;
  const rz2 = -(cy - (canvas.height * 0.5 + panY)) / viewScale;
  const px = xFixed - SCENE_CENTER[0];
  const py = yFixed - SCENE_CENTER[1];
  const ry = px * Math.sin(az) + py * Math.cos(az);
  const pz = (rz2 - ry * Math.sin(el)) / Math.cos(el);
  return pz + SCENE_CENTER[2];
}

// ══════════════════════════════════════════════════════════════
// Drawing helpers
// ══════════════════════════════════════════════════════════════
function drawLine3D(p1, p2, color, width = 1, alpha = 1) {
  const a = toScreen(...p1), b = toScreen(...p2);
  ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
  ctx.strokeStyle = color; ctx.globalAlpha = alpha; ctx.lineWidth = width; ctx.stroke(); ctx.globalAlpha = 1;
}

function drawCircle3D(center, radius, tVal, color, alpha = 0.3, nPts = 36) {
  const pts = [];
  for (let i = 0; i <= nPts; i++) { const th = (i / nPts) * Math.PI * 2; pts.push(toScreen(center[0] + radius * Math.cos(th), center[1] + radius * Math.sin(th), tVal)); }
  ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y); for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y); ctx.closePath();
  ctx.fillStyle = color; ctx.globalAlpha = alpha * 0.3; ctx.fill();
  ctx.strokeStyle = color; ctx.globalAlpha = alpha; ctx.lineWidth = 1; ctx.stroke(); ctx.globalAlpha = 1;
}

// Build a pair of orthonormal vectors perpendicular to `axis` (unit 3D vector).
function perpBasis(axis) {
  let seed = [0, 0, 1];
  if (Math.abs(axis[2]) > 0.9) seed = [1, 0, 0];
  const d = seed[0]*axis[0] + seed[1]*axis[1] + seed[2]*axis[2];
  let e1 = [seed[0]-d*axis[0], seed[1]-d*axis[1], seed[2]-d*axis[2]];
  const en = Math.hypot(e1[0], e1[1], e1[2]);
  e1 = [e1[0]/en, e1[1]/en, e1[2]/en];
  const e2 = [
    axis[1]*e1[2] - axis[2]*e1[1],
    axis[2]*e1[0] - axis[0]*e1[2],
    axis[0]*e1[1] - axis[1]*e1[0],
  ];
  return { e1, e2 };
}

// Draw the time-limited obstacle as a decoupled capsule: skew cylinder of
// xy-radius r along pos(t), plus xy-aligned ellipsoid caps at each endpoint
// with xy semi-axes r and t semi-axis k·r. Matches the new Rust geometry in
// `capsule_surface_support` (rust_optimizer/core/src/spacetime_constraints.rs).
// Cylinder cross-section stays r in xy at every interior t regardless of k.
function drawCapsule(obs, capBulgeRatio, color) {
  const tStart = obs.t_start != null ? obs.t_start : 0;
  const tEnd = obs.t_end != null ? obs.t_end : T_TOTAL;
  const r = obs.r;
  const k = capBulgeRatio;
  const nLon = 14, nLat = 4, nRings = 7;

  // Cylinder body — rings at fixed t and longitudinals at fixed angle.
  for (let i = 0; i <= nRings; i++) {
    const t = tStart + (i / nRings) * (tEnd - tStart);
    const cx = obs.pos0[0] + obs.vel[0] * t;
    const cy = obs.pos0[1] + obs.vel[1] * t;
    const pts = [];
    for (let j = 0; j <= nLon; j++) {
      const th = (j / nLon) * Math.PI * 2;
      pts.push([cx + r * Math.cos(th), cy + r * Math.sin(th), t]);
    }
    for (let j = 0; j < pts.length - 1; j++) drawLine3D(pts[j], pts[j+1], color, 1.1, 0.45);
  }
  for (let j = 0; j < nLon; j++) {
    const th = (j / nLon) * Math.PI * 2;
    const dx = r * Math.cos(th), dy = r * Math.sin(th);
    const p1 = [obs.pos0[0] + obs.vel[0] * tStart + dx, obs.pos0[1] + obs.vel[1] * tStart + dy, tStart];
    const p2 = [obs.pos0[0] + obs.vel[0] * tEnd + dx,   obs.pos0[1] + obs.vel[1] * tEnd + dy,   tEnd];
    drawLine3D(p1, p2, color, 0.8, 0.35);
  }

  // Ellipsoid caps at the two endpoints — flip=+1 for top (t ≥ tEnd),
  // flip=-1 for bottom (t ≤ tStart).
  for (const [capT, flip, capAlpha] of [[tStart, -1, 0.5], [tEnd, 1, 0.55]]) {
    const cx = obs.pos0[0] + obs.vel[0] * capT;
    const cy = obs.pos0[1] + obs.vel[1] * capT;
    // Latitude rings
    for (let i = 1; i <= nLat; i++) {
      const lat = (i / nLat) * Math.PI / 2;
      const ringR = r * Math.cos(lat);
      const tOff = flip * k * r * Math.sin(lat);
      const pts = [];
      for (let j = 0; j <= nLon; j++) {
        const th = (j / nLon) * Math.PI * 2;
        pts.push([cx + ringR * Math.cos(th), cy + ringR * Math.sin(th), capT + tOff]);
      }
      for (let j = 0; j < pts.length - 1; j++) drawLine3D(pts[j], pts[j+1], color, 1.1, capAlpha);
    }
    // Meridians
    for (let j = 0; j < nLon; j++) {
      const th = (j / nLon) * Math.PI * 2;
      const cosT = Math.cos(th), sinT = Math.sin(th);
      const pts = [];
      for (let i = 0; i <= nLat; i++) {
        const lat = (i / nLat) * Math.PI / 2;
        const ringR = r * Math.cos(lat);
        const tOff = flip * k * r * Math.sin(lat);
        pts.push([cx + ringR * cosT, cy + ringR * sinT, capT + tOff]);
      }
      for (let m = 0; m < pts.length - 1; m++) drawLine3D(pts[m], pts[m+1], color, 0.9, capAlpha * 0.75);
    }
  }
}

// JS port of rust_optimizer/core/src/spacetime_constraints.rs::
// capsule_surface_support — split cylinder-body / ellipsoid-cap closest
// point. Body cross-section at any interior t is a circle of radius r in
// xy; caps are axis-aligned ellipsoids with xy semi-axes r and t semi-axis
// k·r (k = capBulgeRatio). Body geometry is independent of k.
function capsuleSupport(queryPoint, obs, planT0, planT1, capBulgeRatio) {
  const tStart = obs.t_start != null ? obs.t_start : -Infinity;
  const tEnd = obs.t_end != null ? obs.t_end : Infinity;
  const effT0 = Math.max(tStart, planT0);
  const effT1 = Math.min(tEnd, planT1);
  if (effT1 < effT0) return null;

  const r = obs.r;
  const k = capBulgeRatio;
  const qt = queryPoint[2];

  // Case 1: query inside the obstacle's time window → body
  if (qt >= effT0 && qt <= effT1) {
    const px = obs.pos0[0] + obs.vel[0] * qt;
    const py = obs.pos0[1] + obs.vel[1] * qt;
    const dx = queryPoint[0] - px, dy = queryPoint[1] - py;
    const dist = Math.hypot(dx, dy);
    if (dist < 1e-10) return null;
    const nx = dx / dist, ny = dy / dist;
    return {
      n: [nx, ny, 0],
      support: [px + r * nx, py + r * ny, qt],
      closest: [px, py, qt],
    };
  }

  // Case 2/3: query outside the window → nearest cap
  const capT = qt > effT1 ? effT1 : effT0;
  const cx = obs.pos0[0] + obs.vel[0] * capT;
  const cy = obs.pos0[1] + obs.vel[1] * capT;

  // Normalize the cap to a sphere: divide t-offset by k.
  const ux = queryPoint[0] - cx;
  const uy = queryPoint[1] - cy;
  const utS = (qt - capT) / k;
  const uNormSq = ux * ux + uy * uy + utS * utS;
  if (uNormSq < 1e-20) return null;
  const uNorm = Math.sqrt(uNormSq);

  // Closest point on the ellipsoid, un-scaled back to (x, y, t).
  const supportX = cx + r * ux / uNorm;
  const supportY = cy + r * uy / uNorm;
  const supportT = capT + r * k * utS / uNorm;

  // Outward normal = grad f / |grad f|; grad f ∝ ((p.xy - c), (p.t - cap_t)/k²).
  const gx = supportX - cx;
  const gy = supportY - cy;
  const gt = (supportT - capT) / (k * k);
  const gNorm = Math.hypot(gx, gy, gt);
  if (gNorm < 1e-10) return null;
  return {
    n: [gx / gNorm, gy / gNorm, gt / gNorm],
    support: [supportX, supportY, supportT],
    closest: [cx, cy, capT],
  };
}

// 3D arrow: shaft + four short head-lines angling back from the tip toward
// the base, giving a recognizable directional pip from any viewing angle.
function drawArrow3D(from, to, color, width, alpha) {
  drawLine3D(from, to, color, width, alpha);
  const dir = [to[0]-from[0], to[1]-from[1], to[2]-from[2]];
  const len = Math.hypot(dir[0], dir[1], dir[2]);
  if (len < 1e-9) return;
  const axis = [dir[0]/len, dir[1]/len, dir[2]/len];
  const { e1, e2 } = perpBasis(axis);
  const headLen = Math.min(0.35, len * 0.45);
  const headR = headLen * 0.55;
  for (const [su, sv] of [[+1,0],[-1,0],[0,+1],[0,-1]]) {
    const base = [
      to[0] - headLen*axis[0] + headR*(su*e1[0] + sv*e2[0]),
      to[1] - headLen*axis[1] + headR*(su*e1[1] + sv*e2[1]),
      to[2] - headLen*axis[2] + headR*(su*e1[2] + sv*e2[2]),
    ];
    drawLine3D(base, to, color, width, alpha);
  }
}

// Draw a half-space boundary plane perpendicular to `normalVec`, centered at
// `support`. Handles normals with any time component (needed for supporting
// planes at capsule caps). `alphaScale` dims the whole element — used when
// another segment is currently under the cursor.
function drawHalfspacePlane(support, normalVec, color, halfLen = 2.2, alphaScale = 1) {
  const nLen = Math.hypot(normalVec[0], normalVec[1], normalVec[2]);
  if (nLen < 1e-12) return;
  const n = [normalVec[0]/nLen, normalVec[1]/nLen, normalVec[2]/nLen];

  let seed = [0, 0, 1];
  if (Math.abs(n[2]) > 0.9) seed = [1, 0, 0];
  const d = seed[0]*n[0] + seed[1]*n[1] + seed[2]*n[2];
  let u = [seed[0]-d*n[0], seed[1]-d*n[1], seed[2]-d*n[2]];
  const un = Math.hypot(u[0], u[1], u[2]);
  u = [u[0]/un, u[1]/un, u[2]/un];
  const v = [
    n[1]*u[2] - n[2]*u[1],
    n[2]*u[0] - n[0]*u[2],
    n[0]*u[1] - n[1]*u[0],
  ];
  const corners = [];
  for (const [su, sv] of [[+1,+1],[-1,+1],[-1,-1],[+1,-1]]) {
    corners.push([
      support[0] + halfLen*(su*u[0] + sv*v[0]),
      support[1] + halfLen*(su*u[1] + sv*v[1]),
      support[2] + halfLen*(su*u[2] + sv*v[2]),
    ]);
  }
  const edgeA = 0.35 * alphaScale;
  const diagA = 0.12 * alphaScale;
  const arrowA = 0.95 * alphaScale;
  const arrowW = 1.6 * (0.5 + 0.5 * alphaScale);
  for (let i = 0; i < 4; i++) drawLine3D(corners[i], corners[(i+1)%4], color, 1, edgeA);
  drawLine3D(corners[0], corners[2], color, 0.6, diagA);
  drawLine3D(corners[1], corners[3], color, 0.6, diagA);
  const arrowLen = 0.9;
  drawArrow3D(
    support,
    [support[0]+arrowLen*n[0], support[1]+arrowLen*n[1], support[2]+arrowLen*n[2]],
    color, arrowW, arrowA
  );
}

function drawTrustBox3D(center, radius, color, alpha) {
  const [cx, cy, ct] = center;
  const r = radius;
  const corners = [
    [cx-r,cy-r,ct-r],[cx+r,cy-r,ct-r],[cx+r,cy+r,ct-r],[cx-r,cy+r,ct-r],
    [cx-r,cy-r,ct+r],[cx+r,cy-r,ct+r],[cx+r,cy+r,ct+r],[cx-r,cy+r,ct+r],
  ];
  const edges = [
    [0,1],[1,2],[2,3],[3,0],  // bottom square (t-)
    [4,5],[5,6],[6,7],[7,4],  // top square (t+)
    [0,4],[1,5],[2,6],[3,7],  // verticals in t
  ];
  for (const [a, b] of edges) drawLine3D(corners[a], corners[b], color, 0.8, alpha);
}

function drawHullFaces(pts3d, color, alpha) {
  const sp = pts3d.map(p => toScreen(...p));
  const hull = convexHull2D(sp);
  if (hull.length < 3) return;
  ctx.beginPath(); ctx.moveTo(sp[hull[0]].x, sp[hull[0]].y);
  for (let i = 1; i < hull.length; i++) ctx.lineTo(sp[hull[i]].x, sp[hull[i]].y);
  ctx.closePath(); ctx.fillStyle = color; ctx.globalAlpha = alpha; ctx.fill();
  ctx.strokeStyle = color; ctx.globalAlpha = alpha * 2; ctx.lineWidth = 0.5; ctx.stroke(); ctx.globalAlpha = 1;
}

// ══════════════════════════════════════════════════════════════
// Main draw
// ══════════════════════════════════════════════════════════════
function draw() {
  if (!CTRL_PTS.length) return;
  const tNow = tFrac * T_TOTAL;

  document.getElementById('tVal').textContent = tNow.toFixed(1);
  document.getElementById('rotVal').textContent = azimuth.toFixed(1);
  document.getElementById('elevVal').textContent = elevation.toFixed(1);
  document.getElementById('rotSlider').value = azimuth;
  document.getElementById('elevSlider').value = elevation;

  // Common geometry computation (shared by 3D and 2D views + info panel)
  const fullCurve = bezierCurve(CTRL_PTS, 400);
  let curPt = fullCurve[0];
  for (let i = 0; i < fullCurve.length; i++) { if (fullCurve[i][2] >= tNow) { curPt = fullCurve[i]; break; } }

  const dists = [];
  for (const obs of OBSTACLES) {
    const t0 = obs.t_start != null ? obs.t_start : -Infinity;
    const t1 = obs.t_end != null ? obs.t_end : Infinity;
    if (tNow < t0 || tNow > t1) continue;
    const ox = obs.pos0[0] + obs.vel[0] * tNow, oy = obs.pos0[1] + obs.vel[1] * tNow;
    const dx = curPt[0] - ox, dy = curPt[1] - oy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    dists.push({ name: obs.name, dist: dist - obs.r, color: obs.color, ox, oy, r: obs.r, dx, dy, rawDist: dist });
  }

  const minClearances = {};
  for (const pt of fullCurve) {
    for (const obs of OBSTACLES) {
      const t0 = obs.t_start != null ? obs.t_start : -Infinity;
      const t1 = obs.t_end != null ? obs.t_end : Infinity;
      if (pt[2] < t0 || pt[2] > t1) continue;
      const ox = obs.pos0[0] + obs.vel[0] * pt[2], oy = obs.pos0[1] + obs.vel[1] * pt[2];
      const d = Math.sqrt((pt[0] - ox) ** 2 + (pt[1] - oy) ** 2) - obs.r;
      if (!(obs.name in minClearances) || d < minClearances[obs.name]) minClearances[obs.name] = d;
    }
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (viewMode === '2d') {
    draw2DScene(tNow, curPt, fullCurve, dists);
  } else {
    draw3DScene(tNow, curPt, fullCurve, dists);
  }
  renderInfoPanel(tNow, curPt, dists, minClearances);
}

function draw3DScene(tNow, curPt, fullCurve, dists) {
  const showTubes = document.getElementById('chkTubes').checked;
  const showHull = document.getElementById('chkHull').checked;
  const showSeg = document.getElementById('chkSegments').checked;
  const showHS = document.getElementById('chkHalfspace').checked;
  const showDist = document.getElementById('chkDistLines').checked;
  const showTP = document.getElementById('chkTimePlane').checked;
  const nSub = Math.max(1, currentSolveInfo.n_seg || 8);
  const alpha = serverMode ? parseFloat(document.getElementById('alphaSlider').value) : 1;
  const trustR = serverMode ? parseFloat(document.getElementById('trustSlider').value) : 0;
  const capBulge = serverMode ? currentCapBulgeRatio() : 2.0;

  // Axes
  drawLine3D([0,0,0],[10,0,0],'#666',1,0.4); drawLine3D([0,0,0],[0,10,0],'#666',1,0.4); drawLine3D([0,0,0],[0,0,T_TOTAL],'#666',1,0.4);
  const lx=toScreen(10.5,0,0),ly=toScreen(0,10.5,0),lz=toScreen(0,0,T_TOTAL+0.5);
  ctx.font='12px monospace'; ctx.fillStyle='#888'; ctx.fillText('x',lx.x,lx.y); ctx.fillText('y',ly.x,ly.y); ctx.fillText('t',lz.x,lz.y);
  for(let i=0;i<=10;i+=2){drawLine3D([i,0,0],[i,10,0],'#333',0.5,0.2);drawLine3D([0,i,0],[10,i,0],'#333',0.5,0.2);}

  // Alpha envelope: if α > 1, the optimizer can place interior control points
  // at times above T. Visualize that slack as a dashed t-axis extension.
  if (alpha > 1.001) {
    const tMax = alpha * T_TOTAL;
    ctx.save(); ctx.setLineDash([4, 4]);
    drawLine3D([0, 0, T_TOTAL], [0, 0, tMax], '#8af', 1, 0.6);
    ctx.restore();
    const labelPos = toScreen(0, 0, tMax + 0.5);
    ctx.font = '11px monospace'; ctx.fillStyle = '#8af';
    ctx.fillText(`α·T = ${tMax.toFixed(1)}`, labelPos.x + 6, labelPos.y);
  }

  if (showTubes) { for (const obs of OBSTACLES) drawCapsule(obs, capBulge, obs.color); }

  // Obstacle control-point handles: these are the source of truth for direct
  // manipulation — drawn on top of the capsule so the user can always grab
  // them. Pick targets are refreshed each frame so camera moves stay accurate.
  obstacleCPPickTargets.length = 0;
  const bezierObstaclesForHandles = (currentScenario && Array.isArray(currentScenario.bezier_obstacles))
    ? currentScenario.bezier_obstacles : [];
  bezierObstaclesForHandles.forEach((bo, obsIdx) => {
    const cps = bo.control_points;
    if (!Array.isArray(cps) || cps.length < 2) return;
    const handleColor = bo.color || '#ffa500';
    for (let i = 0; i < cps.length - 1; i++) {
      drawLine3D(cps[i], cps[i+1], handleColor, 1.2, 0.55);
    }
    cps.forEach((p, cpIdx) => {
      const sp = toScreen(...p);
      const isHover = hoveredObstacleCP && hoveredObstacleCP.obsIdx === obsIdx && hoveredObstacleCP.cpIdx === cpIdx;
      const r = isHover ? 7 : 4.5;
      ctx.beginPath(); ctx.arc(sp.x, sp.y, r, 0, Math.PI * 2);
      ctx.fillStyle = handleColor; ctx.globalAlpha = 0.95; ctx.fill();
      ctx.strokeStyle = isHover ? '#fff' : '#000';
      ctx.lineWidth = isHover ? 2 : 1;
      ctx.stroke();
      ctx.globalAlpha = 1;
      obstacleCPPickTargets.push({ obsIdx, cpIdx, sx: sp.x, sy: sp.y });
    });
  });

  if (showTP && tNow > 0) {
    const co = [[0,0,tNow],[10,0,tNow],[10,10,tNow],[0,10,tNow]].map(c => toScreen(...c));
    ctx.beginPath(); ctx.moveTo(co[0].x,co[0].y); for(let i=1;i<4;i++) ctx.lineTo(co[i].x,co[i].y);
    ctx.closePath(); ctx.fillStyle='#fff'; ctx.globalAlpha=0.04; ctx.fill(); ctx.strokeStyle='#fff'; ctx.globalAlpha=0.15; ctx.lineWidth=0.5; ctx.stroke(); ctx.globalAlpha=1;
    for (const obs of OBSTACLES) {
      const t0=obs.t_start!=null?obs.t_start:-Infinity, t1=obs.t_end!=null?obs.t_end:Infinity;
      if (tNow >= t0 && tNow <= t1) {
        drawCircle3D([obs.pos0[0]+obs.vel[0]*tNow, obs.pos0[1]+obs.vel[1]*tNow], obs.r, tNow, obs.color, 0.6);
      }
    }
  }

  const segColors = ['#f0f','#0ff','#ff0','#f80','#8f0','#08f','#f08','#0f8','#fa0','#0fa','#a0f','#af0','#f0a','#0af','#a00','#0a0'];
  const segments = subdivide(CTRL_PTS, nSub);
  if (showSeg) {
    segments.forEach((seg, si) => {
      const c = segColors[si % segColors.length];
      const crv = bezierCurve(seg, 50);
      for (let i=0;i<crv.length-1;i++) drawLine3D(crv[i],crv[i+1],c,1.5,0.5);
      seg.forEach(p => { const sp=toScreen(...p); ctx.beginPath(); ctx.arc(sp.x,sp.y,3,0,Math.PI*2); ctx.fillStyle=c; ctx.globalAlpha=0.6; ctx.fill(); ctx.globalAlpha=1; });
      for(let i=0;i<seg.length-1;i++) drawLine3D(seg[i],seg[i+1],c,0.5,0.3);
      if(showHull) drawHullFaces(seg,c,0.06);
    });
  }
  if(showHull && !showSeg) drawHullFaces(CTRL_PTS,'#ffc800',0.08);

  if (showHS) {
    const planT0 = CTRL_PTS[0][2];
    const planT1 = CTRL_PTS[CTRL_PTS.length - 1][2];
    segments.forEach((seg, segIdx) => {
      // Dim segments the user isn't hovering on. When no segment is hovered,
      // everything renders at full alpha (same as before).
      const isActive = hoveredSegIdx === null || segIdx === hoveredSegIdx;
      const alphaScale = isActive ? 1.0 : 0.15;
      const centroid = [0,0,0];
      seg.forEach(p => { for (let d = 0; d < 3; d++) centroid[d] += p[d]; });
      for (let d = 0; d < 3; d++) centroid[d] /= seg.length;
      for (const obs of OBSTACLES) {
        const result = capsuleSupport(centroid, obs, planT0, planT1, capBulge);
        if (!result) continue;
        drawHalfspacePlane(result.support, result.n, '#ff0', 2.2, alphaScale);
        drawLine3D(result.closest, result.support, '#ff0', 1.2, 0.55 * alphaScale);
      }
    });
    // Highlight the hovered segment's curve piece so the SHS↔segment mapping
    // is unambiguous.
    if (hoveredSegIdx !== null) {
      const seg = segments[hoveredSegIdx];
      const crv = bezierCurve(seg, 60);
      for (let i = 0; i < crv.length - 1; i++) drawLine3D(crv[i], crv[i+1], '#ffa500', 3, 0.9);
    }
  }

  // Initial-guess overlay (drawn behind so the solved curve remains primary)
  if (document.getElementById('chkInitCurve').checked && INIT_CTRL_PTS.length > 0) {
    const initCurve = bezierCurve(INIT_CTRL_PTS, 200);
    for (let i = 0; i < initCurve.length - 1; i++) {
      drawLine3D(initCurve[i], initCurve[i+1], '#66d', 1.2, 0.5);
    }
    for (let i = 0; i < INIT_CTRL_PTS.length - 1; i++) {
      drawLine3D(INIT_CTRL_PTS[i], INIT_CTRL_PTS[i+1], '#66d', 0.6, 0.3);
    }
    INIT_CTRL_PTS.forEach(p => {
      const sp = toScreen(...p);
      ctx.beginPath(); ctx.arc(sp.x, sp.y, 3, 0, Math.PI * 2);
      ctx.fillStyle = '#66d'; ctx.globalAlpha = 0.55; ctx.fill(); ctx.globalAlpha = 1;
    });
  }

  // Trajectory (past = bright, future = faint)
  for(let i=0;i<fullCurve.length-1;i++) drawLine3D(fullCurve[i],fullCurve[i+1],'#ff0',2,0.15);
  for(let i=0;i<fullCurve.length-1;i++){if(fullCurve[i][2]>tNow)break; drawLine3D(fullCurve[i],fullCurve[i+1],'#ff0',2.5,1);}

  // Control polygon
  for(let i=0;i<CTRL_PTS.length-1;i++) drawLine3D(CTRL_PTS[i],CTRL_PTS[i+1],'#888',1,0.5);
  CTRL_PTS.forEach((p,i)=>{const sp=toScreen(...p); ctx.beginPath(); ctx.arc(sp.x,sp.y,5,0,Math.PI*2); ctx.fillStyle=i===0?'#0f0':i===CTRL_PTS.length-1?'#f00':'#fff'; ctx.fill(); ctx.strokeStyle='#000'; ctx.lineWidth=1; ctx.stroke();});

  // Trust-region boxes: axis-aligned cube of side 2·trust_radius around each
  // interior CP (endpoints are boundary-constrained so trust doesn't apply).
  if (trustR > 0.001) {
    ctx.save(); ctx.setLineDash([3, 3]);
    for (let i = 1; i < CTRL_PTS.length - 1; i++) drawTrustBox3D(CTRL_PTS[i], trustR, '#8af', 0.45);
    ctx.restore();
  }

  // Current position marker
  const sp = toScreen(...curPt);
  ctx.beginPath(); ctx.arc(sp.x,sp.y,7,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill(); ctx.strokeStyle='#ff0'; ctx.lineWidth=2; ctx.stroke();

  // Distance lines
  if (showDist) {
    for (const d of dists) {
      if (d.rawDist <= 0.01) continue;
      const nx = d.dx / d.rawDist, ny = d.dy / d.rawDist;
      drawLine3D(curPt, [d.ox + d.r * nx, d.oy + d.r * ny, tNow], d.color, 1.5, 0.8);
      const mid = toScreen((curPt[0] + d.ox + d.r * nx) / 2, (curPt[1] + d.oy + d.r * ny) / 2, tNow);
      ctx.font = '11px monospace'; ctx.fillStyle = d.dist < 0 ? '#f00' : d.color;
      ctx.fillText(d.dist.toFixed(2), mid.x + 5, mid.y - 5);
    }
  }
}

// Full-canvas 2D (x, y) view at the current time t. The 3D scene is collapsed
// to the time slice so you can read path geometry without occlusion from tubes.
function draw2DScene(tNow, curPt, fullCurve, dists) {
  const showHull = document.getElementById('chkHull').checked;
  const showSeg = document.getElementById('chkSegments').checked;
  const showDist = document.getElementById('chkDistLines').checked;
  const nSub = Math.max(1, currentSolveInfo.n_seg || 8);
  const trustR = serverMode ? parseFloat(document.getElementById('trustSlider').value) : 0;

  const pad = 60;
  const w = canvas.width - 2 * pad;
  const h = canvas.height - 2 * pad;
  const s = Math.min(w, h) / 11; // world is [-0.5, 10.5] in x and y
  const originX = canvas.width / 2 - 5 * s;
  const originY = canvas.height / 2 + 5 * s;
  const tx = v => originX + v * s;
  const ty = v => originY - v * s;

  // Grid and axes
  ctx.strokeStyle = '#333'; ctx.lineWidth = 0.5; ctx.globalAlpha = 0.5;
  for (let i = 0; i <= 10; i++) {
    ctx.beginPath(); ctx.moveTo(tx(i), ty(0)); ctx.lineTo(tx(i), ty(10)); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(tx(0), ty(i)); ctx.lineTo(tx(10), ty(i)); ctx.stroke();
  }
  ctx.globalAlpha = 1;
  ctx.strokeStyle = '#666'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(tx(0), ty(0)); ctx.lineTo(tx(10), ty(0)); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(tx(0), ty(0)); ctx.lineTo(tx(0), ty(10)); ctx.stroke();
  ctx.fillStyle = '#888'; ctx.font = '12px monospace';
  ctx.fillText('x', tx(10.3), ty(-0.2));
  ctx.fillText('y', tx(-0.3), ty(10.3));
  ctx.fillText(`t = ${tNow.toFixed(2)} / ${T_TOTAL}`, pad, pad - 12);

  // Obstacles at the current time slice
  for (const obs of OBSTACLES) {
    const t0 = obs.t_start != null ? obs.t_start : -Infinity;
    const t1 = obs.t_end != null ? obs.t_end : Infinity;
    const active = tNow >= t0 && tNow <= t1;
    const cx = obs.pos0[0] + obs.vel[0] * tNow;
    const cy = obs.pos0[1] + obs.vel[1] * tNow;
    ctx.beginPath(); ctx.arc(tx(cx), ty(cy), obs.r * s, 0, Math.PI * 2);
    ctx.fillStyle = obs.color; ctx.globalAlpha = active ? 0.3 : 0.05; ctx.fill();
    ctx.strokeStyle = obs.color; ctx.globalAlpha = active ? 0.9 : 0.2; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.globalAlpha = 1;
    if (active) {
      ctx.fillStyle = obs.color;
      ctx.fillText(obs.name, tx(cx) + obs.r * s + 3, ty(cy));
    }
  }

  // De Casteljau segments (polygon outlines in 2D only — no per-segment hull faces)
  if (showSeg) {
    const segColors = ['#f0f','#0ff','#ff0','#f80','#8f0','#08f','#f08','#0f8','#fa0','#0fa','#a0f','#af0','#f0a','#0af','#a00','#0a0'];
    const segments = subdivide(CTRL_PTS, nSub);
    segments.forEach((seg, si) => {
      const c = segColors[si % segColors.length];
      ctx.strokeStyle = c; ctx.globalAlpha = 0.4; ctx.lineWidth = 0.8;
      ctx.beginPath();
      seg.forEach((p, idx) => {
        const X = tx(p[0]), Y = ty(p[1]);
        if (idx === 0) ctx.moveTo(X, Y); else ctx.lineTo(X, Y);
      });
      ctx.stroke(); ctx.globalAlpha = 1;
    });
  }

  if (showHull) {
    const screenPts = CTRL_PTS.map(p => ({ x: tx(p[0]), y: ty(p[1]) }));
    const idx = convexHull2D(screenPts.map(p => [p.x, p.y]));
    ctx.beginPath();
    idx.forEach((i, k) => {
      if (k === 0) ctx.moveTo(screenPts[i].x, screenPts[i].y);
      else ctx.lineTo(screenPts[i].x, screenPts[i].y);
    });
    ctx.closePath(); ctx.fillStyle = '#ffc800'; ctx.globalAlpha = 0.06; ctx.fill();
    ctx.strokeStyle = '#ffc800'; ctx.globalAlpha = 0.3; ctx.lineWidth = 1; ctx.stroke(); ctx.globalAlpha = 1;
  }

  // Initial-guess overlay (behind the solved curve)
  if (document.getElementById('chkInitCurve').checked && INIT_CTRL_PTS.length > 0) {
    const initCurve = bezierCurve(INIT_CTRL_PTS, 200);
    ctx.strokeStyle = '#66d'; ctx.globalAlpha = 0.55; ctx.lineWidth = 1.2;
    ctx.beginPath();
    initCurve.forEach((p, i) => {
      const X = tx(p[0]), Y = ty(p[1]);
      if (i === 0) ctx.moveTo(X, Y); else ctx.lineTo(X, Y);
    });
    ctx.stroke(); ctx.globalAlpha = 1;
    INIT_CTRL_PTS.forEach(p => {
      ctx.beginPath(); ctx.arc(tx(p[0]), ty(p[1]), 3, 0, Math.PI * 2);
      ctx.fillStyle = '#66d'; ctx.globalAlpha = 0.55; ctx.fill(); ctx.globalAlpha = 1;
    });
  }

  // Full trajectory (faint) + past portion (bright)
  ctx.strokeStyle = '#ff0'; ctx.globalAlpha = 0.2; ctx.lineWidth = 1.5;
  ctx.beginPath();
  fullCurve.forEach((p, i) => {
    const X = tx(p[0]), Y = ty(p[1]);
    if (i === 0) ctx.moveTo(X, Y); else ctx.lineTo(X, Y);
  });
  ctx.stroke();
  ctx.strokeStyle = '#ff0'; ctx.globalAlpha = 1; ctx.lineWidth = 2.5;
  ctx.beginPath();
  let started = false;
  for (const p of fullCurve) {
    if (p[2] > tNow) break;
    const X = tx(p[0]), Y = ty(p[1]);
    if (!started) { ctx.moveTo(X, Y); started = true; } else ctx.lineTo(X, Y);
  }
  if (started) ctx.stroke();
  ctx.globalAlpha = 1;

  // Control polygon
  ctx.strokeStyle = '#888'; ctx.lineWidth = 1; ctx.globalAlpha = 0.6;
  ctx.beginPath();
  CTRL_PTS.forEach((p, i) => { if (i === 0) ctx.moveTo(tx(p[0]), ty(p[1])); else ctx.lineTo(tx(p[0]), ty(p[1])); });
  ctx.stroke(); ctx.globalAlpha = 1;
  CTRL_PTS.forEach((p, i) => {
    ctx.beginPath(); ctx.arc(tx(p[0]), ty(p[1]), 5, 0, Math.PI * 2);
    ctx.fillStyle = i === 0 ? '#0f0' : i === CTRL_PTS.length - 1 ? '#f00' : '#fff';
    ctx.fill(); ctx.strokeStyle = '#000'; ctx.lineWidth = 1; ctx.stroke();
  });

  // Trust-region boxes around interior CPs (visual of configured param).
  if (trustR > 0.001) {
    ctx.save(); ctx.setLineDash([3, 3]);
    ctx.strokeStyle = '#8af'; ctx.globalAlpha = 0.45; ctx.lineWidth = 0.8;
    for (let i = 1; i < CTRL_PTS.length - 1; i++) {
      const p = CTRL_PTS[i];
      const X = tx(p[0]), Y = ty(p[1]);
      const rPx = trustR * s;
      ctx.strokeRect(X - rPx, Y - rPx, 2 * rPx, 2 * rPx);
    }
    ctx.globalAlpha = 1; ctx.restore();
  }

  // Current position marker
  ctx.beginPath(); ctx.arc(tx(curPt[0]), ty(curPt[1]), 7, 0, Math.PI * 2);
  ctx.fillStyle = '#fff'; ctx.fill();
  ctx.strokeStyle = '#ff0'; ctx.lineWidth = 2; ctx.stroke();

  // Distance lines
  if (showDist) {
    for (const d of dists) {
      if (d.rawDist <= 0.01) continue;
      const nx = d.dx / d.rawDist, ny = d.dy / d.rawDist;
      const ex = d.ox + d.r * nx, ey = d.oy + d.r * ny;
      ctx.strokeStyle = d.color; ctx.globalAlpha = 0.8; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(tx(curPt[0]), ty(curPt[1])); ctx.lineTo(tx(ex), ty(ey)); ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.fillStyle = d.dist < 0 ? '#f00' : d.color;
      ctx.fillText(d.dist.toFixed(2), (tx(curPt[0]) + tx(ex)) / 2 + 4, (ty(curPt[1]) + ty(ey)) / 2 - 4);
    }
  }
}

function renderInfoPanel(tNow, curPt, dists, minClearances) {
  const cData = currentSolveInfo;
  let info = `Scenario: ${currentScenario.title}\n`;
  info += `Curve: N=${cData.N}, seg=${cData.n_seg}\n`;
  info += `CPs: ${CTRL_PTS.length}, reported clr: ${cData.min_clearance.toFixed(4)}\n\n`;
  info += `t = ${tNow.toFixed(2)} / ${T_TOTAL}\n`;
  info += `pos = (${curPt[0].toFixed(2)}, ${curPt[1].toFixed(2)})\n\n`;
  if (dists.length > 0) {
    info += `Active clearance:\n`;
    const byPrefix = {};
    for (const d of dists) {
      const prefix = d.name.replace(/\d+$/,'');
      if (!(prefix in byPrefix) || d.dist < byPrefix[prefix].dist) byPrefix[prefix] = d;
    }
    for (const [prefix, d] of Object.entries(byPrefix)) {
      info += `  ${prefix}: ${d.dist.toFixed(3)}${d.dist<0?' !!':''}\n`;
    }
  }
  info += `\nMin clearance (full):\n`;
  const mcByPrefix = {};
  for (const [name, d] of Object.entries(minClearances)) {
    const prefix = name.replace(/\d+$/,'');
    if (!(prefix in mcByPrefix) || d < mcByPrefix[prefix]) mcByPrefix[prefix] = d;
  }
  for (const [prefix, d] of Object.entries(mcByPrefix)) {
    info += `  ${prefix}: ${d.toFixed(3)}${d<0?' !!':''}\n`;
  }
  document.getElementById('info').textContent = info;
}

function updateLegend() {
  const el = document.getElementById('legend');
  // deduplicate wall obstacles by prefix
  const seen = {};
  let html = '';
  for (const obs of OBSTACLES) {
    const prefix = obs.name.replace(/\d+$/,'');
    if (seen[prefix]) continue;
    seen[prefix] = true;
    const label = prefix === 'W' ? `W0-W${OBSTACLES.filter(o=>o.name.startsWith('W')).length-1} (wall, t<5)` : obs.name;
    html += `<div><span style="color:${obs.color}">*</span> ${label}</div>`;
  }
  html += `<div style="margin-top:4px"><span style="color:#ff0">-</span> Bezier trajectory</div>`;
  html += `<div><span style="color:#888">o</span> Control polygon</div>`;
  el.innerHTML = html;

async function refreshScenarioData() {
  try {
    const response = await fetch('./spacetime_scenarios.json', { cache: 'no-store' });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const data = await response.json();
    if (!data || typeof data !== 'object' || Array.isArray(data) || Object.keys(data).length === 0) {
      throw new Error('spacetime_scenarios.json is empty');

    for (const key of Object.keys(SCENARIOS)) delete SCENARIOS[key];
    Object.assign(SCENARIOS, data);
    return true;

    console.warn('Falling back to embedded scenario data:', err);

// Mirror of spacetime_bezier.geometry.moving_obstacle_from_bezier: a wire-format
// BezierObstacle (degree-1, two control points in (x,y,t) plus `radius`) becomes
// the legacy `{pos0, vel, r, t_start, t_end, name, color}` dict consumed by the
// render code (drawCapsule, capsuleSupport, updateLegend).
function legacyFromBezier(bo) {
  const cps = bo.control_points;
  if (!Array.isArray(cps) || cps.length < 2) {
    throw new Error('BezierObstacle must have >=2 control points');
  }
  const p0 = cps[0], p1 = cps[1];
  const t0 = p0[p0.length - 1];
  const t1 = p1[p1.length - 1];
  const dim = p0.length - 1;
  const vel = new Array(dim);
  const pos0 = new Array(dim);
  const dt = t1 - t0;
  for (let i = 0; i < dim; i++) {
    vel[i] = dt > 0 ? (p1[i] - p0[i]) / dt : 0;
    pos0[i] = p0[i] - vel[i] * t0;
  }
  const out = { pos0, vel, r: bo.radius, t_start: t0, t_end: t1 };
  if (bo.name != null) out.name = bo.name;
  if (bo.color != null) out.color = bo.color;
  return out;
}

function setStatus(kind, text, progressPct) {

function scheduleSolve() {
  if (!serverMode) return;
  if (solveDebounceHandle !== null) clearTimeout(solveDebounceHandle);
  solveDebounceHandle = setTimeout(() => {
    solveDebounceHandle = null;
    doSolve();
  }, SOLVE_DEBOUNCE_MS);
}

async function doSolve() {
  if (!serverMode || !currentScenario) return;
  const seq = ++solveRequestSeq;
  solveInFlight = true;

  // Progress ticker: estimate percentage from elapsed / lastSolveMs, capped
  // at 95% so we never claim "done" before the response actually arrives.
  const solveStart = performance.now();
  stopSolveProgress();
  setStatus('solving', `solving ${currentScenario.name}... 0%`, 0);
  solveProgressHandle = setInterval(() => {
    const elapsed = performance.now() - solveStart;
    const pct = Math.min(95, (elapsed / Math.max(80, lastSolveMs)) * 100);
    setStatus('solving', `solving ${currentScenario.name}... ${pct.toFixed(0)}% (${elapsed.toFixed(0)}ms)`, pct);
  }, 50);

  const params = currentSandboxParams();
  const body = JSON.stringify({
    scenario_name: currentScenario.name,
    obstacles: currentScenario.bezier_obstacles,
    start: currentScenario.start,
    end: currentScenario.end,
    T: currentScenario.T,
    ...params,
  });
  let response;
  try {
    response = await fetch('/api/solve', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body,
    });
  } catch (err) {
    if (seq !== solveRequestSeq) return;
    solveInFlight = false;
    stopSolveProgress();
    setStatus('failed', `solve failed: network error (${err.message})`, 100);
    return;
  }
  const clientMs = performance.now() - solveStart;

  if (seq !== solveRequestSeq) return; // superseded by a newer request

  let data;
  try {
    data = await response.json();
  } catch (err) {
    solveInFlight = false;
    stopSolveProgress();
    setStatus('failed', `solve failed: bad JSON (${err.message})`, 100);
    return;
  }

  if (!response.ok || data.error) {
    solveInFlight = false;
    stopSolveProgress();
    const msg = data.error || `HTTP ${response.status}`;
    setStatus('failed', `solve failed: ${msg}`, 100);
    return;
  }

  solveInFlight = false;
  stopSolveProgress();
  // Exponential smoothing so lastSolveMs adapts but doesn't jump wildly
  const serverMs = data.solve_ms != null ? data.solve_ms : clientMs;
  lastSolveMs = 0.5 * lastSolveMs + 0.5 * Math.max(40, serverMs);
  applySolveResponse(data, clientMs);
}

function applySolveResponse(data, clientMs) {
  const info = data.info || {};
  const feasible = !!info.feasible;
  const iters = info.iterations != null ? info.iterations : '-';
  const clr = info.min_clearance != null ? info.min_clearance : NaN;
  const serverMs = data.solve_ms != null ? data.solve_ms : NaN;
  const cacheTag = '';

  if (Array.isArray(data.obstacles)) {
    currentScenario.bezier_obstacles = data.obstacles;
    OBSTACLES = data.obstacles.map(legacyFromBezier);
  }
  if (Array.isArray(data.start)) currentScenario.start = data.start.slice();
  if (Array.isArray(data.end)) currentScenario.end = data.end.slice();
  currentScenario.T = data.T;
  T_TOTAL = data.T;
  if (Array.isArray(data.init_control_points)) INIT_CTRL_PTS = data.init_control_points;

  if (feasible) {
    lastFeasibleResponse = data;
    CTRL_PTS = data.control_points;
    currentSolveInfo = {
      N: data.N,
      n_seg: data.n_seg,
      min_clearance: clr,
      feasible: true,
    };
    setStatus(
      'solved',
      `solved · N=${data.N} seg=${data.n_seg} · iters=${iters} · clr=${clr.toFixed(3)} · solve=${serverMs.toFixed(0)}ms (round-trip ${clientMs.toFixed(0)}ms)${cacheTag}`,
      100,
    );
  } else {
    // Infeasible: keep last feasible trajectory visible if we have one; otherwise
    // render the returned (infeasible) control points so the user still sees something.
    if (lastFeasibleResponse) {
      CTRL_PTS = lastFeasibleResponse.control_points;
      currentSolveInfo = {
        N: lastFeasibleResponse.N,
        n_seg: lastFeasibleResponse.n_seg,
        min_clearance: lastFeasibleResponse.info.min_clearance,
        feasible: true,
      };
    } else {
      CTRL_PTS = data.control_points;
      currentSolveInfo = {
        N: data.N,
        n_seg: data.n_seg,
        min_clearance: isFinite(clr) ? clr : 0,
        feasible: false,
      };
    }
    setStatus(
      'infeasible',
      `infeasible at N=${data.N} seg=${data.n_seg} · iters=${iters} · clr=${isFinite(clr) ? clr.toFixed(3) : 'n/a'} · solve=${serverMs.toFixed(0)}ms · showing last feasible${cacheTag}`,
      100,
    );
  }
  draw();
}

function loadScenarioFromServer(name) {

}

// Hover picking: find the closest curve point to the cursor and translate
// back to a segment index (floor(t · n_seg)). Only meaningful in 3D and only
// when "Supporting half-spaces" is on — otherwise we skip the walk to stay
// cheap on passive mouse motion.
function updateHoverFromCursor(cx, cy) {
  if (viewMode !== '3d' || !CTRL_PTS.length) return;

  // Obstacle control-point hover runs independent of the SHS flag so the
  // handles are always grabbable.
  let cpBest = OBSTACLE_CP_PICK_PX * OBSTACLE_CP_PICK_PX;
  let cpHit = null;
  for (const tgt of obstacleCPPickTargets) {
    const dx = tgt.sx - cx, dy = tgt.sy - cy;
    const d2 = dx*dx + dy*dy;
    if (d2 < cpBest) {
      cpBest = d2;
      cpHit = { obsIdx: tgt.obsIdx, cpIdx: tgt.cpIdx };
    }
  }
  const prev = hoveredObstacleCP;
  const cpChanged = (prev === null) !== (cpHit === null) ||
    (prev !== null && cpHit !== null && (prev.obsIdx !== cpHit.obsIdx || prev.cpIdx !== cpHit.cpIdx));
  hoveredObstacleCP = cpHit;
  canvas.style.cursor = cpHit ? 'pointer' : (dragMode ? 'grabbing' : 'grab');

  // SHS segment hover: only meaningful while the SHS overlay is visible.
  let segChanged = false;
  if (!document.getElementById('chkHalfspace').checked) {
    if (hoveredSegIdx !== null) { hoveredSegIdx = null; segChanged = true; }
  } else {
    const nSub = Math.max(1, currentSolveInfo.n_seg || 8);
    const threshSq = HOVER_PIXEL_THRESHOLD * HOVER_PIXEL_THRESHOLD;
    let best = threshSq;
    let bestSeg = null;
    const nSamples = 160;
    for (let i = 0; i <= nSamples; i++) {
      const t = i / nSamples;
      const pt = evalBezier(CTRL_PTS, t);
      const sp = toScreen(...pt);
      const dx = sp.x - cx, dy = sp.y - cy;
      const d2 = dx*dx + dy*dy;
      if (d2 < best) {
        best = d2;
        bestSeg = Math.min(nSub - 1, Math.floor(t * nSub));
      }
    }
    if (bestSeg !== hoveredSegIdx) {
      hoveredSegIdx = bestSeg;
      segChanged = true;
    }
  }

  if (cpChanged || segChanged) draw();
}

canvas.addEventListener('mousemove', e => {
  if (dragMode || cpDragState) return;  // don't hover-update mid-drag
  const rect = canvas.getBoundingClientRect();
  updateHoverFromCursor(e.clientX - rect.left, e.clientY - rect.top);
});
canvas.addEventListener('mouseleave', () => {
  let changed = false;
  if (hoveredSegIdx !== null) { hoveredSegIdx = null; changed = true; }
  if (hoveredObstacleCP !== null) { hoveredObstacleCP = null; changed = true; }
  if (changed) draw();
});

canvas.addEventListener('contextmenu', e => e.preventDefault());
canvas.addEventListener('mousedown', e => {
  if (viewMode === '2d') return;  // 2D is static — no pan/rotate

  // Obstacle CP under the cursor? Start a constrained drag instead of the
  // camera. Shift switches the constraint from the (x, y) plane at fixed t
  // to the vertical line at fixed (x, y).
  if (e.button === 0 && hoveredObstacleCP && currentScenario && Array.isArray(currentScenario.bezier_obstacles)) {
    const { obsIdx, cpIdx } = hoveredObstacleCP;
    const bo = currentScenario.bezier_obstacles[obsIdx];
    if (bo && Array.isArray(bo.control_points) && bo.control_points[cpIdx]) {
      cpDragState = {
        obsIdx, cpIdx,
        mode: e.shiftKey ? 't' : 'xy',
        initial: bo.control_points[cpIdx].slice(),
        moved: false,
      };
      // Invalidate any in-flight solve so its response can't clobber the
      // obstacle we're editing (applySolveResponse keys off the latest seq).
      solveRequestSeq++;
      canvas.style.cursor = 'grabbing';
      e.preventDefault();
      return;
    }
  }

  if (e.button === 0) dragMode = e.shiftKey ? 'pan' : 'rotate';
  else if (e.button === 2) dragMode = 'pan';
  else return;
  lastMouseX = e.clientX;
  lastMouseY = e.clientY;
  updateCanvasCursor();
  e.preventDefault();
});
window.addEventListener('mousemove', e => {
  // Obstacle CP drag takes priority: the camera is locked while the user
  // is editing a control point.
  if (cpDragState) {
    if (e.buttons === 0) {
      // User released outside any tracked element — treat as mouseup.
      const moved = cpDragState.moved;
      cpDragState = null;
      canvas.style.cursor = 'grab';
      if (moved) scheduleSolve();
      return;
    }
    const rect = canvas.getBoundingClientRect();
    const cx = e.clientX - rect.left, cy = e.clientY - rect.top;
    const bo = currentScenario.bezier_obstacles[cpDragState.obsIdx];
    const cp = bo.control_points[cpDragState.cpIdx];
    if (cpDragState.mode === 'xy') {
      const tFixed = cpDragState.initial[2];
      const [nx, ny] = screenToWorldAtFixedT(cx, cy, tFixed);
      cp[0] = nx; cp[1] = ny; cp[2] = tFixed;
    } else {
      const xFixed = cpDragState.initial[0];
      const yFixed = cpDragState.initial[1];
      const newT = clamp(screenYToTAtFixedXY(cy, xFixed, yFixed), 0, T_TOTAL);
      cp[0] = xFixed; cp[1] = yFixed; cp[2] = newT;
    }
    cpDragState.moved = true;
    // Keep the legacy obstacle (drives the capsule mesh, clearance line, and
    // 2D view) in sync with the edited Bezier so the capsule follows the drag.
    OBSTACLES[cpDragState.obsIdx] = legacyFromBezier(bo);
    draw();
    e.preventDefault();
    return;
  }

  if (!dragMode) return;
  if (e.buttons === 0) {
    dragMode = null;
    updateCanvasCursor();
    return;
  }
  const dx = e.clientX - lastMouseX;
  const dy = e.clientY - lastMouseY;
  lastMouseX = e.clientX;
  lastMouseY = e.clientY;
  if (dragMode === 'pan') {
    panX += dx;
    panY += dy;
  } else {
    azimuth = wrapAngle(azimuth + dx * 0.6);
    elevation = clamp(elevation - dy * 0.35, 5, 85);
  }
  draw();
  e.preventDefault();
});
window.addEventListener('mouseup', () => {
  if (cpDragState) {
    const moved = cpDragState.moved;
    cpDragState = null;
    canvas.style.cursor = 'grab';
    if (moved) scheduleSolve();
    return;
  }
  dragMode = null;
  updateCanvasCursor();
});
window.addEventListener('keydown', e => {
  if (e.key === 'Escape' && cpDragState) {
    // Restore the CP to its pre-drag position and skip the re-solve.
    const bo = currentScenario.bezier_obstacles[cpDragState.obsIdx];
    bo.control_points[cpDragState.cpIdx] = cpDragState.initial.slice();
    OBSTACLES[cpDragState.obsIdx] = legacyFromBezier(bo);
    cpDragState = null;
    canvas.style.cursor = 'grab';
    draw();
  }
});
canvas.addEventListener('wheel', e => {
  if (viewMode === '2d') return;  // Zoom is 3D-only for now
  e.preventDefault();
  viewScale = clamp(viewScale * Math.exp(-e.deltaY * 0.0015), 16, 140);
  draw();
}, { passive: false });

document.getElementById('btnPlay').addEventListener('click', () => {
  playing = !playing;
  document.getElementById('btnPlay').textContent = playing ? '⏸' : '▶';
  if (playing) requestAnimationFrame(animate);
});
document.getElementById('btnReset').addEventListener('click', () => {
  tFrac = 0; document.getElementById('tSlider').value = 0; playing = false;
  document.getElementById('btnPlay').textContent = '▶'; draw();
});
document.getElementById('btnResetProblem').addEventListener('click', () => {
  if (!INIT_CTRL_PTS.length) {
    setStatus('offline', 'no initial guess yet — run a solve first', 0);
    return;
  }
  // Cancel any pending/in-flight solve so we don't immediately overwrite the reset.
  if (solveDebounceHandle !== null) { clearTimeout(solveDebounceHandle); solveDebounceHandle = null; }
  solveRequestSeq++;
  stopSolveProgress();
  CTRL_PTS = INIT_CTRL_PTS.map(p => p.slice());
  currentSolveInfo = {
    N: INIT_CTRL_PTS.length - 1,
    n_seg: currentSolveInfo.n_seg || 1,
    min_clearance: 0,
    feasible: false,
  };
  lastFeasibleResponse = null;
  setStatus('offline', 'showing initial guess (not solved) — move a slider to re-solve', 0);
  draw();
});

function animate() {
  if (!playing) return;
  tFrac += 0.003; if (tFrac > 1) tFrac = 0;
  document.getElementById('tSlider').value = tFrac; draw();
  requestAnimationFrame(animate);
}

// Init
async function init() {
  document.body.dataset.viewMode = viewMode;
  syncSandboxReadouts();
  const catalog = await tryLoadServerCatalog();
  if (catalog) {
    serverMode = true;
    serverCatalog = catalog;
    document.body.dataset.serverMode = 'true';
    enableSandboxControls(true);
    populateScenarioSelector(catalog);
    const names = Object.keys(catalog);
    if (!names.length) {
      setStatus('failed', 'server returned no scenarios');
      return;
    }
    scenarioSelect.value = names[0];
    loadScenarioFromServer(names[0]);
    return;
  }

  // File:// or no-server fallback: use pre-baked JSON / embedded data.
  serverMode = false;
  document.body.dataset.serverMode = 'false';
  enableSandboxControls(false);
  setStatus('offline', 'solver: offline (open via `python3 -m spacetime_bezier` for live re-solve)');
  const loadedFreshJson = await refreshScenarioData();
  populateScenarioSelector(SCENARIOS);
  const names = Object.keys(SCENARIOS);
  if (!names.length) {
    document.getElementById('info').textContent = 'No scenario data available.';
    return;
  }
  if (!loadedFreshJson) {
    document.getElementById('info').textContent =
      'Viewer fell back to embedded scenario data. Run `python3 -m spacetime_bezier` for live re-solve.';
  }
  loadScenario(names[0]);
}

init();
</script>
